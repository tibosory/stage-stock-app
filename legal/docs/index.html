<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stage Stock — Confidentialité &amp; CGU</title>
  <style>
    :root { color-scheme: dark; }
    body {
      font-family: system-ui, Segoe UI, Roboto, sans-serif;
      line-height: 1.55;
      max-width: 44rem;
      margin: 0 auto;
      padding: 1.25rem 1rem 3rem;
      background: #09090b;
      color: #e4e4e7;
    }
    a { color: #86efac; }
    nav {
      position: sticky;
      top: 0;
      background: #09090b;
      padding: 0.75rem 0;
      border-bottom: 1px solid #27272a;
      margin-bottom: 1.5rem;
    }
    nav a { margin-right: 1rem; font-weight: 600; }
    .meta {
      font-size: 0.9rem;
      color: #a1a1aa;
      margin-bottom: 2rem;
    }
    .md { font-size: 0.95rem; }
    .md table { border-collapse: collapse; width: 100%; margin: 1rem 0; font-size: 0.88rem; }
    .md th, .md td { border: 1px solid #3f3f46; padding: 0.4rem 0.5rem; text-align: left; }
    .md h1 { font-size: 1.35rem; margin-top: 2rem; }
    .md h2 { font-size: 1.15rem; margin-top: 1.5rem; color: #86efac; }
    .md h3 { font-size: 1rem; margin-top: 1rem; }
    .md p { margin: 0.65rem 0; }
    .md ul, .md ol { padding-left: 1.25rem; }
    .md hr { border: none; border-top: 1px solid #3f3f46; margin: 1.5rem 0; }
  </style>
</head>
<body>
  <nav>
    <a href="#politique">Politique de confidentialité</a>
    <a href="#cgu">CGU</a>
  </nav>
  <p class="meta">
    <strong>Stage Stock</strong> — Thibaut Sory · 14 rue du Bret, bâtiment 2, 38090 Villefontaine, France ·
    <a href="mailto:tibosory@gmail.com">tibosory@gmail.com</a>
  </p>
  <p class="meta">Page unique : politique et conditions d’utilisation.</p>

  <section id="politique">
    <h2 style="color:#86efac;margin-top:0;">Politique de confidentialité</h2>
    <div id="politique-md" class="md">Chargement…</div>
  </section>

  <hr style="border:none;border-top:1px solid #3f3f46;margin:2.5rem 0;" />

  <section id="cgu">
    <h2 style="color:#86efac;">Conditions générales d’utilisation</h2>
    <div id="cgu-md" class="md">Chargement…</div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    async function load() {
      try {
        const [p, c] = await Promise.all([
          fetch('POLITIQUE_CONFIDENTIALITE.md').then(function (r) { return r.text(); }),
          fetch('CGU.md').then(function (r) { return r.text(); }),
        ]);
        document.getElementById('politique-md').innerHTML = marked.parse(p);
        document.getElementById('cgu-md').innerHTML = marked.parse(c);
      } catch (e) {
        document.getElementById('politique-md').textContent =
          'Impossible de charger les textes. Ouvrez cette page via un serveur HTTP (ex. GitHub Pages), pas en fichier local.';
      }
    }
    load();
  </script>
</body>
</html>
